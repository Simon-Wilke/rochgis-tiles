name: RochGIS Tile Generator

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Download parcels
        run: python scripts/download_parcels.py

      - name: Install Tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y tippecanoe

      - name: Generate tiles
        run: bash scripts/generate_tiles.sh

      - name: Validate output
        run: python scripts/validate_tiles.py

      - name: Upload tiles artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiles
          path: tiles

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tiles
          force_orphan: true
          keep_files: false